<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Streamgraph — 클러스터별 논문 흐름</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #fafaf8;
        font-family: "Noto Sans KR", sans-serif;
        color: #1a1a1a;
        padding: 48px 56px;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .question {
        font-size: 15px;
        color: #666;
        margin-bottom: 6px;
        font-weight: 400;
      }
      .rationale {
        font-size: 13px;
        color: #888;
        line-height: 1.7;
        margin-bottom: 36px;
        max-width: 820px;
      }
      #chart {
        width: 100%;
      }
      .tooltip {
        position: absolute;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 12px;
        line-height: 1.6;
        pointer-events: none;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        opacity: 0;
        transition: opacity 0.15s;
      }
      .axis text {
        font-family: "Noto Sans KR", sans-serif;
        font-size: 12px;
        fill: #666;
      }
      .axis line,
      .axis path {
        stroke: #ddd;
      }
      .legend {
        margin-top: 24px;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #555;
      }
      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 3px;
      }
      .stream-layer {
        transition: opacity 0.15s;
      }
      .stream-layer.dimmed {
        opacity: 0.15;
      }
      .year-marker {
        stroke: #ccc;
        stroke-width: 1;
        stroke-dasharray: 3, 3;
      }
    </style>
  </head>
  <body>
    <h1>Streamgraph — 클러스터별 논문 흐름</h1>
    <p class="question">이 시각화가 답하는 질문: "어떤 연구 갈래가 언제, 얼마나 급증했는가?"</p>
    <p class="rationale">
      Streamgraph는 시계열 위에 범주별 면적을 가운데 정렬로 쌓아, 전체 규모 변화와 개별 범주의 성장
      비율을 동시에 보여준다. 일반적인 stacked area chart와 달리 기준선이 중앙에 놓이므로, 특정
      갈래의 급팽창(RAG 2023~2026)이 유기적 흐름으로 드러난다. 네트워크 과학에서 토픽 진화를
      시간축으로 추적할 때 ThemeRiver 계열 기법의 핵심 표현이다.
    </p>

    <div id="chart"></div>
    <div class="legend" id="legend"></div>
    <div class="tooltip" id="tooltip"></div>

    <script>
      // ─── 공유 더미 데이터 ───
      const clusters = [
        { id: "ext_mem", label: "외부 메모리", color: "#4a90d9" },
        { id: "cog_arch", label: "인지 아키텍처", color: "#e8743b" },
        { id: "sim", label: "시뮬레이션", color: "#50b48a" },
        { id: "rag", label: "RAG", color: "#9b59b6" },
        { id: "multi", label: "멀티모달", color: "#e74c6f" },
      ];

      const years = [2020, 2021, 2022, 2023, 2024, 2025, 2026];

      const paperCounts = {
        ext_mem: [12, 15, 18, 22, 28, 35, 40],
        cog_arch: [20, 22, 25, 30, 35, 38, 42],
        sim: [8, 10, 14, 18, 22, 26, 30],
        rag: [2, 4, 8, 25, 65, 120, 180],
        multi: [0, 0, 1, 3, 12, 45, 85],
      };

      const keys = clusters.map((c) => c.id);
      const colorMap = {};
      const labelMap = {};
      clusters.forEach((c) => {
        colorMap[c.id] = c.color;
        labelMap[c.id] = c.label;
      });

      // prepare data for d3.stack
      const data = years.map((y, i) => {
        const row = { year: y };
        keys.forEach((k) => (row[k] = paperCounts[k][i]));
        return row;
      });

      // ─── 레이아웃 ───
      const margin = { top: 20, right: 40, bottom: 40, left: 50 };
      const width = 900 - margin.left - margin.right;
      const height = 420 - margin.top - margin.bottom;

      const tooltip = d3.select("#tooltip");

      const svg = d3
        .select("#chart")
        .append("svg")
        .attr("width", width + margin.left + margin.right)
        .attr("height", height + margin.top + margin.bottom)
        .append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

      const x = d3.scaleLinear().domain([2020, 2026]).range([0, width]);

      const stack = d3
        .stack()
        .keys(keys)
        .offset(d3.stackOffsetSilhouette)
        .order(d3.stackOrderInsideOut);

      const series = stack(data);

      const yMax = d3.max(series, (s) => d3.max(s, (d) => Math.abs(d[1])));
      const y = d3.scaleLinear().domain([-yMax, yMax]).range([height, 0]);

      const area = d3
        .area()
        .x((d) => x(d.data.year))
        .y0((d) => y(d[0]))
        .y1((d) => y(d[1]))
        .curve(d3.curveBasis);

      // year markers
      years.forEach((yr) => {
        svg
          .append("line")
          .attr("class", "year-marker")
          .attr("x1", x(yr))
          .attr("x2", x(yr))
          .attr("y1", 0)
          .attr("y2", height);
      });

      // streams
      const layers = svg
        .selectAll(".stream-layer")
        .data(series)
        .join("path")
        .attr("class", "stream-layer")
        .attr("d", area)
        .attr("fill", (d) => colorMap[d.key])
        .attr("fill-opacity", 0.82)
        .attr("stroke", "#fff")
        .attr("stroke-width", 0.5)
        .on("mouseover", function (event, d) {
          layers.classed("dimmed", true);
          d3.select(this).classed("dimmed", false).attr("fill-opacity", 0.95);

          const key = d.key;
          const counts = paperCounts[key];
          const growth = counts[6] - counts[0];
          tooltip
            .style("opacity", 1)
            .html(
              `<strong>${labelMap[key]}</strong><br>` +
                `2020: ${counts[0]}편 → 2026: ${counts[6]}편<br>` +
                `총 성장: +${growth}편 (${counts[0] > 0 ? ((counts[6] / counts[0]) * 100).toFixed(0) + "%" : "∞"})`,
            );
        })
        .on("mousemove", (event) => {
          tooltip.style("left", event.pageX + 14 + "px").style("top", event.pageY - 24 + "px");
        })
        .on("mouseout", function () {
          layers.classed("dimmed", false).attr("fill-opacity", 0.82);
          tooltip.style("opacity", 0);
        });

      // stream labels
      series.forEach((s) => {
        const lastPoint = s[s.length - 1];
        const midY = (y(lastPoint[0]) + y(lastPoint[1])) / 2;
        const thickness = Math.abs(y(lastPoint[0]) - y(lastPoint[1]));
        if (thickness > 18) {
          svg
            .append("text")
            .attr("x", x(2026) + 6)
            .attr("y", midY)
            .attr("dy", "0.35em")
            .attr("font-size", "11px")
            .attr("font-weight", 500)
            .attr("fill", colorMap[s.key])
            .text(labelMap[s.key]);
        }
      });

      // x axis
      svg
        .append("g")
        .attr("class", "axis")
        .attr("transform", `translate(0,${height})`)
        .call(d3.axisBottom(x).ticks(7).tickFormat(d3.format("d")))
        .select(".domain")
        .remove();

      // invisible vertical hover line + year tooltip
      const hoverLine = svg
        .append("line")
        .attr("y1", 0)
        .attr("y2", height)
        .attr("stroke", "#333")
        .attr("stroke-width", 1)
        .attr("stroke-dasharray", "4,3")
        .style("opacity", 0);

      const hoverLabel = svg
        .append("text")
        .attr("y", -6)
        .attr("font-size", "11px")
        .attr("font-weight", 500)
        .attr("fill", "#333")
        .attr("text-anchor", "middle")
        .style("opacity", 0);

      svg
        .append("rect")
        .attr("width", width)
        .attr("height", height)
        .attr("fill", "transparent")
        .on("mousemove", function (event) {
          const [mx] = d3.pointer(event);
          const yr = Math.round(x.invert(mx));
          if (yr >= 2020 && yr <= 2026) {
            hoverLine.attr("x1", x(yr)).attr("x2", x(yr)).style("opacity", 0.4);
            hoverLabel.attr("x", x(yr)).text(yr).style("opacity", 1);
          }
        })
        .on("mouseout", () => {
          hoverLine.style("opacity", 0);
          hoverLabel.style("opacity", 0);
        });

      // legend
      const legendEl = d3.select("#legend");
      clusters.forEach((c) => {
        const item = legendEl.append("div").attr("class", "legend-item");
        item.append("div").attr("class", "legend-swatch").style("background", c.color);
        item.append("span").text(c.label);
      });
    </script>
  </body>
</html>
