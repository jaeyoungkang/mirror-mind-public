<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporal Network Snapshots (Small Multiples)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fafaf8;
    font-family: 'Noto Sans KR', sans-serif;
    color: #1a1a1a;
    padding: 48px 56px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .question {
    font-size: 15px;
    color: #666;
    margin-bottom: 6px;
    font-weight: 400;
  }
  .rationale {
    font-size: 13px;
    color: #888;
    line-height: 1.7;
    margin-bottom: 36px;
    max-width: 820px;
  }
  #chart { width: 100%; }
  .panel-title {
    font-size: 13px;
    font-weight: 500;
    fill: #444;
  }
  .node-label {
    font-size: 9px;
    fill: #555;
    pointer-events: none;
  }
  .tooltip {
    position: absolute;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.6;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .legend { margin-top: 24px; display: flex; gap: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 50%; }
</style>
</head>
<body>

<h1>Temporal Network Snapshots (Small Multiples)</h1>
<p class="question">이 시각화가 답하는 질문: "연구 클러스터 간 연결 구조가 연도별로 어떻게 진화했는가?"</p>
<p class="rationale">
  Small multiples는 동일 레이아웃을 유지한 채 시간 슬라이스별 네트워크를 나란히 놓아,
  구조 변화를 직접 비교할 수 있게 한다. 노드 위치를 고정함으로써 독자는 위치 학습 없이
  엣지 밀도의 증감에만 집중할 수 있다. 네트워크 과학에서 temporal graph의
  "snapshot sequence" 표현은 가장 직관적인 변화 탐지 기법이다.
</p>

<div id="chart"></div>
<div class="legend" id="legend"></div>
<div class="tooltip" id="tooltip"></div>

<script>
// ─── 공유 더미 데이터 ───
const clusters = [
  { id: 'ext_mem',   label: '외부 메모리',     color: '#4a90d9' },
  { id: 'cog_arch',  label: '인지 아키텍처',   color: '#e8743b' },
  { id: 'sim',       label: '시뮬레이션',       color: '#50b48a' },
  { id: 'rag',       label: 'RAG',              color: '#9b59b6' },
  { id: 'multi',     label: '멀티모달',         color: '#e74c6f' },
];

const years = [2020, 2021, 2022, 2023, 2024, 2025, 2026];

// 클러스터별 연도별 논문 수
const paperCounts = {
  ext_mem:  [12, 15, 18, 22, 28, 35, 40],
  cog_arch: [20, 22, 25, 30, 35, 38, 42],
  sim:      [8,  10, 14, 18, 22, 26, 30],
  rag:      [2,  4,  8,  25, 65, 120, 180],
  multi:    [0,  0,  1,  3,  12, 45, 85],
};

// cross-cluster 엣지 (연도별 가중치)
const edges = [
  { source: 'ext_mem',  target: 'cog_arch', weights: [3, 4, 5, 7, 10, 14, 18],  burst: false },
  { source: 'ext_mem',  target: 'rag',      weights: [0, 1, 2, 5, 15, 28, 40],  burst: true },
  { source: 'cog_arch', target: 'sim',      weights: [2, 3, 4, 5, 6, 8, 10],    burst: false },
  { source: 'cog_arch', target: 'rag',      weights: [0, 0, 1, 4, 12, 22, 35],  burst: true },
  { source: 'sim',      target: 'multi',    weights: [0, 0, 0, 1, 4, 12, 20],   burst: true },
  { source: 'rag',      target: 'multi',    weights: [0, 0, 0, 2, 8, 25, 50],   burst: true },
  { source: 'ext_mem',  target: 'sim',      weights: [1, 1, 2, 3, 4, 5, 7],     burst: false },
  { source: 'ext_mem',  target: 'multi',    weights: [0, 0, 0, 0, 2, 8, 15],    burst: true },
  { source: 'cog_arch', target: 'multi',    weights: [0, 0, 0, 1, 3, 10, 18],   burst: true },
  { source: 'sim',      target: 'rag',      weights: [0, 0, 1, 2, 5, 10, 16],   burst: false },
];

// compute deltas
edges.forEach(e => {
  const w = e.weights;
  e.deltas = w.map((v, i) => i === 0 ? 0 : v - w[i - 1]);
});

// ─── 레이아웃 ───
const panelW = 160, panelH = 160;
const gap = 24;
const cols = years.length;
const svgW = cols * (panelW + gap) - gap + 40;
const svgH = panelH + 60;

// 고정 노드 위치 (원형 배치)
const cx = panelW / 2, cy = panelH / 2, radius = 55;
const nodePositions = {};
clusters.forEach((c, i) => {
  const angle = (2 * Math.PI * i) / clusters.length - Math.PI / 2;
  nodePositions[c.id] = { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
});

const clusterMap = {};
clusters.forEach(c => clusterMap[c.id] = c);

const sizeScale = d3.scaleSqrt().domain([0, 180]).range([4, 16]);
const edgeScale = d3.scaleLinear().domain([0, 50]).range([0.5, 5]);
const edgeOpacity = d3.scaleLinear().domain([0, 50]).range([0.1, 0.7]);

const tooltip = d3.select('#tooltip');

const svg = d3.select('#chart').append('svg')
  .attr('width', svgW)
  .attr('height', svgH);

years.forEach((year, yi) => {
  const offsetX = yi * (panelW + gap) + 20;
  const g = svg.append('g').attr('transform', `translate(${offsetX}, 30)`);

  // panel background
  g.append('rect')
    .attr('width', panelW)
    .attr('height', panelH)
    .attr('rx', 8)
    .attr('fill', '#fff')
    .attr('stroke', '#e8e8e6')
    .attr('stroke-width', 1);

  // year label
  g.append('text')
    .attr('class', 'panel-title')
    .attr('x', panelW / 2)
    .attr('y', -10)
    .attr('text-anchor', 'middle')
    .text(year);

  // edges
  edges.forEach(e => {
    const w = e.weights[yi];
    if (w <= 0) return;
    const s = nodePositions[e.source];
    const t = nodePositions[e.target];
    const delta = e.deltas[yi];

    g.append('line')
      .attr('x1', s.x).attr('y1', s.y)
      .attr('x2', t.x).attr('y2', t.y)
      .attr('stroke', e.burst ? '#e74c6f' : '#aaa')
      .attr('stroke-width', edgeScale(w))
      .attr('stroke-opacity', edgeOpacity(w))
      .attr('stroke-dasharray', e.burst && delta > 5 ? '4,2' : 'none')
      .on('mouseover', (event) => {
        tooltip.style('opacity', 1).html(
          `<strong>${clusterMap[e.source].label} ↔ ${clusterMap[e.target].label}</strong><br>` +
          `${year}년 연결 수: ${w}<br>` +
          `변화량(Δ): ${delta >= 0 ? '+' : ''}${delta}<br>` +
          `Burst: ${e.burst ? '예' : '아니오'}`
        );
      })
      .on('mousemove', (event) => {
        tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 20) + 'px');
      })
      .on('mouseout', () => tooltip.style('opacity', 0));
  });

  // nodes
  clusters.forEach(c => {
    const pos = nodePositions[c.id];
    const count = paperCounts[c.id][yi];
    if (count === 0) return;

    const nodeG = g.append('g').attr('transform', `translate(${pos.x},${pos.y})`);

    nodeG.append('circle')
      .attr('r', sizeScale(count))
      .attr('fill', c.color)
      .attr('fill-opacity', 0.85)
      .attr('stroke', '#fff')
      .attr('stroke-width', 1.5)
      .on('mouseover', (event) => {
        tooltip.style('opacity', 1).html(
          `<strong>${c.label}</strong><br>${year}년 논문 수: ${count}`
        );
      })
      .on('mousemove', (event) => {
        tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 20) + 'px');
      })
      .on('mouseout', () => tooltip.style('opacity', 0));

    nodeG.append('text')
      .attr('class', 'node-label')
      .attr('y', sizeScale(count) + 11)
      .attr('text-anchor', 'middle')
      .text(c.label);
  });
});

// legend
const legendEl = d3.select('#legend');
clusters.forEach(c => {
  const item = legendEl.append('div').attr('class', 'legend-item');
  item.append('div').attr('class', 'legend-swatch').style('background', c.color);
  item.append('span').text(c.label);
});
const burstItem = legendEl.append('div').attr('class', 'legend-item');
burstItem.append('div').attr('class', 'legend-swatch')
  .style('background', 'transparent')
  .style('border', '2px solid #e74c6f');
burstItem.append('span').text('Burst 엣지');
</script>
</body>
</html>
