<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expected vs Observed Scatter — Structural Gap Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fafaf8;
    font-family: 'Noto Sans KR', sans-serif;
    color: #1a1a1a;
    padding: 48px 56px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .question {
    font-size: 15px;
    font-weight: 400;
    color: #666;
    margin-bottom: 6px;
  }
  .rationale {
    font-size: 13px;
    font-weight: 300;
    color: #888;
    line-height: 1.7;
    max-width: 720px;
    margin-bottom: 32px;
  }
  #chart {
    position: relative;
  }
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    line-height: 1.6;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .tooltip .label { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .tooltip .row { display: flex; justify-content: space-between; gap: 24px; }
  .tooltip .key { color: #888; }
  .tooltip .val { font-weight: 500; }
  .axis-label {
    font-size: 12px;
    fill: #888;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .legend {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 16px;
    font-size: 12px;
    color: #888;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<h1>Expected vs Observed Scatter</h1>
<p class="question">이 시각화가 답하는 질문: 어떤 클러스터 쌍이 가장 심각한 구조적 공백(gap)인가?</p>
<p class="rationale">
  링크 예측 모델이 "연결이 있어야 한다"고 추정하는 쌍(expectedStrength)과 실제 관측 강도(observedStrength)를 직교 좌표에 놓으면,
  대각선(x=y) 아래에 위치할수록 예측 대비 실제 연결이 부족한 구조적 공백 후보다.
  점의 크기로 gapScore를, 색상으로 coverage를 동시에 인코딩하여 "심각도 + 탐색 가능성"을 한 눈에 파악할 수 있다.
</p>

<div id="chart"></div>
<div class="legend" id="legend"></div>

<script>
// ── Shared Dummy Data ──
const clusters = ['Reasoning', 'Memory', 'Planning', 'Retrieval', 'Generation'];
const data = [
  { source: 'Reasoning',  target: 'Memory',     observedStrength: 0.82, expectedStrength: 0.85, gapScore: 0.08, structuralScarcity: 0.15, coverage: 0.90, uncertainty: 0.10 },
  { source: 'Reasoning',  target: 'Planning',    observedStrength: 0.35, expectedStrength: 0.78, gapScore: 0.72, structuralScarcity: 0.80, coverage: 0.25, uncertainty: 0.65 },
  { source: 'Reasoning',  target: 'Retrieval',   observedStrength: 0.60, expectedStrength: 0.70, gapScore: 0.25, structuralScarcity: 0.35, coverage: 0.55, uncertainty: 0.30 },
  { source: 'Memory',     target: 'Planning',    observedStrength: 0.20, expectedStrength: 0.72, gapScore: 0.78, structuralScarcity: 0.85, coverage: 0.18, uncertainty: 0.72 },
  { source: 'Memory',     target: 'Generation',  observedStrength: 0.68, expectedStrength: 0.65, gapScore: 0.05, structuralScarcity: 0.10, coverage: 0.85, uncertainty: 0.08 },
  { source: 'Planning',   target: 'Retrieval',   observedStrength: 0.15, expectedStrength: 0.68, gapScore: 0.82, structuralScarcity: 0.90, coverage: 0.12, uncertainty: 0.78 },
  { source: 'Planning',   target: 'Generation',  observedStrength: 0.45, expectedStrength: 0.60, gapScore: 0.35, structuralScarcity: 0.45, coverage: 0.40, uncertainty: 0.42 },
  { source: 'Retrieval',  target: 'Generation',  observedStrength: 0.72, expectedStrength: 0.75, gapScore: 0.10, structuralScarcity: 0.18, coverage: 0.78, uncertainty: 0.12 },
  { source: 'Reasoning',  target: 'Generation',  observedStrength: 0.28, expectedStrength: 0.74, gapScore: 0.70, structuralScarcity: 0.75, coverage: 0.22, uncertainty: 0.60 },
  { source: 'Memory',     target: 'Retrieval',   observedStrength: 0.55, expectedStrength: 0.62, gapScore: 0.18, structuralScarcity: 0.28, coverage: 0.62, uncertainty: 0.22 },
];

// ── Dimensions ──
const margin = { top: 32, right: 40, bottom: 56, left: 60 };
const width = 680;
const height = 560;
const innerW = width - margin.left - margin.right;
const innerH = height - margin.top - margin.bottom;

// ── Scales ──
const x = d3.scaleLinear().domain([0, 1]).range([0, innerW]);
const y = d3.scaleLinear().domain([0, 1]).range([innerH, 0]);
const r = d3.scaleSqrt().domain([0, 1]).range([5, 28]);
const color = d3.scaleSequential(d3.interpolateViridis).domain([0, 1]);

// ── SVG ──
const svg = d3.select('#chart')
  .append('svg')
  .attr('width', width)
  .attr('height', height);

const g = svg.append('g')
  .attr('transform', `translate(${margin.left},${margin.top})`);

// ── Diagonal reference line ──
g.append('line')
  .attr('x1', x(0)).attr('y1', y(0))
  .attr('x2', x(1)).attr('y2', y(1))
  .attr('stroke', '#ccc')
  .attr('stroke-width', 1.5)
  .attr('stroke-dasharray', '6,4');

g.append('text')
  .attr('x', x(0.92))
  .attr('y', y(0.96))
  .attr('class', 'axis-label')
  .attr('fill', '#bbb')
  .attr('font-size', '11px')
  .text('x = y (no gap)');

// ── Gap zone shading ──
g.append('polygon')
  .attr('points', `${x(0)},${y(0)} ${x(1)},${y(1)} ${x(1)},${y(0)}`)
  .attr('fill', '#ff4444')
  .attr('opacity', 0.04);

g.append('text')
  .attr('x', x(0.78))
  .attr('y', y(0.18))
  .attr('class', 'axis-label')
  .attr('fill', '#cc8888')
  .attr('font-size', '11px')
  .attr('text-anchor', 'middle')
  .text('Gap Zone');

// ── Axes ──
const xAxis = d3.axisBottom(x).ticks(5).tickFormat(d3.format('.1f'));
const yAxis = d3.axisLeft(y).ticks(5).tickFormat(d3.format('.1f'));

g.append('g')
  .attr('transform', `translate(0,${innerH})`)
  .call(xAxis)
  .selectAll('text').style('font-family', 'Noto Sans KR');

g.append('g')
  .call(yAxis)
  .selectAll('text').style('font-family', 'Noto Sans KR');

// Axis labels
svg.append('text')
  .attr('class', 'axis-label')
  .attr('x', margin.left + innerW / 2)
  .attr('y', height - 8)
  .attr('text-anchor', 'middle')
  .text('Expected Strength');

svg.append('text')
  .attr('class', 'axis-label')
  .attr('x', -(margin.top + innerH / 2))
  .attr('y', 16)
  .attr('text-anchor', 'middle')
  .attr('transform', 'rotate(-90)')
  .text('Observed Strength');

// ── Tooltip ──
const tooltip = d3.select('#chart')
  .append('div')
  .attr('class', 'tooltip');

// ── Dots ──
g.selectAll('circle')
  .data(data)
  .enter()
  .append('circle')
  .attr('cx', d => x(d.expectedStrength))
  .attr('cy', d => y(d.observedStrength))
  .attr('r', d => r(d.gapScore))
  .attr('fill', d => color(d.coverage))
  .attr('stroke', '#fff')
  .attr('stroke-width', 1.5)
  .attr('opacity', 0.85)
  .attr('cursor', 'pointer')
  .on('mouseover', function(event, d) {
    d3.select(this).attr('opacity', 1).attr('stroke', '#333').attr('stroke-width', 2);
    tooltip.style('opacity', 1)
      .html(`
        <div class="label">${d.source} — ${d.target}</div>
        <div class="row"><span class="key">Expected</span><span class="val">${d.expectedStrength.toFixed(2)}</span></div>
        <div class="row"><span class="key">Observed</span><span class="val">${d.observedStrength.toFixed(2)}</span></div>
        <div class="row"><span class="key">Gap Score</span><span class="val">${d.gapScore.toFixed(2)}</span></div>
        <div class="row"><span class="key">Coverage</span><span class="val">${d.coverage.toFixed(2)}</span></div>
        <div class="row"><span class="key">Uncertainty</span><span class="val">${d.uncertainty.toFixed(2)}</span></div>
      `);
  })
  .on('mousemove', function(event) {
    tooltip
      .style('left', (event.offsetX + 16) + 'px')
      .style('top', (event.offsetY - 10) + 'px');
  })
  .on('mouseout', function() {
    d3.select(this).attr('opacity', 0.85).attr('stroke', '#fff').attr('stroke-width', 1.5);
    tooltip.style('opacity', 0);
  });

// ── Pair labels ──
g.selectAll('.pair-label')
  .data(data.filter(d => d.gapScore > 0.5))
  .enter()
  .append('text')
  .attr('class', 'axis-label')
  .attr('x', d => x(d.expectedStrength) + r(d.gapScore) + 4)
  .attr('y', d => y(d.observedStrength) + 4)
  .attr('font-size', '10px')
  .attr('fill', '#555')
  .text(d => `${d.source[0]}–${d.target[0]}`);

// ── Legend ──
const legendDiv = d3.select('#legend');

// Size legend
legendDiv.append('span').attr('class', 'legend-item').html('점 크기 = gapScore');

// Color legend
const colorStops = [0, 0.25, 0.5, 0.75, 1.0];
const colorLeg = legendDiv.append('span').attr('class', 'legend-item');
colorLeg.append('span').text('색상 = coverage: ');
colorStops.forEach(v => {
  colorLeg.append('span')
    .attr('class', 'legend-swatch')
    .style('background', color(v))
    .style('display', 'inline-block');
});
colorLeg.append('span').text(' 0 → 1');
</script>
</body>
</html>
