<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ego Network / Star Plot — Bridge Node Visualization</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fafaf8;
    font-family: 'Noto Sans KR', sans-serif;
    color: #333;
    padding: 40px 48px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .question {
    font-size: 15px;
    color: #666;
    margin-bottom: 6px;
    font-weight: 400;
  }
  .rationale {
    font-size: 13px;
    color: #888;
    line-height: 1.7;
    margin-bottom: 28px;
    max-width: 720px;
  }
  .controls {
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .controls label {
    font-size: 13px;
    font-weight: 500;
    color: #555;
  }
  .controls select {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
  }
  svg {
    display: block;
    border: 1px solid #e8e8e4;
    border-radius: 8px;
    background: #fff;
  }
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(30,30,30,0.92);
    color: #fff;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.6;
    max-width: 260px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .legend {
    display: flex;
    gap: 16px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #666;
  }
  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
</style>
</head>
<body>
<h1>Ego Network / Star Plot</h1>
<p class="question">이 시각화가 답하는 질문: "이 다리(bridge) 논문이 어떤 클러스터들을 잇는가?"</p>
<p class="rationale">
  Ego network은 특정 노드를 중심에 놓고 직접 연결된 이웃만 방사형으로 펼치는 기법이다.
  네트워크 전체를 보여주는 대신 한 노드의 국소 구조에 집중하므로, bridge 노드가 서로 다른 클러스터를
  어떻게 매개하는지 시각적으로 즉시 파악할 수 있다. 클러스터별 색상 분포가 방사형으로 드러나기 때문에
  "이 논문이 정말 다리 역할을 하는가"를 직관적으로 판별할 수 있다.
</p>

<div class="controls">
  <label for="ego-select">Bridge 노드 선택:</label>
  <select id="ego-select"></select>
</div>

<div id="chart"></div>
<div class="legend" id="legend"></div>
<div class="tooltip" id="tooltip"></div>

<script>
// ─── Shared Data ───
const clusterColors = {
  "외부 메모리": "#7aaa7a",
  "인지 아키텍처": "#7a7aaa",
  "시뮬레이션": "#aa8a6a",
  "RAG": "#8aaa8a",
  "멀티모달": "#aa7a8a"
};

const nodes = [
  { id: "P01", label: "MemFormer", cluster: "외부 메모리", degree: 0.57, betweenness: 0.12, bridgeScore: 0.35, citationCount: 142 },
  { id: "P02", label: "RecallNet", cluster: "외부 메모리", degree: 0.43, betweenness: 0.08, bridgeScore: 0.18, citationCount: 87 },
  { id: "P03", label: "EpisodicLLM", cluster: "외부 메모리", degree: 0.36, betweenness: 0.05, bridgeScore: 0.12, citationCount: 63 },
  { id: "P04", label: "CogArch-T", cluster: "인지 아키텍처", degree: 0.50, betweenness: 0.22, bridgeScore: 0.61, citationCount: 210 },
  { id: "P05", label: "ThinkLoop", cluster: "인지 아키텍처", degree: 0.43, betweenness: 0.15, bridgeScore: 0.42, citationCount: 156 },
  { id: "P06", label: "MetaCog", cluster: "인지 아키텍처", degree: 0.29, betweenness: 0.04, bridgeScore: 0.09, citationCount: 44 },
  { id: "P07", label: "SimWorld", cluster: "시뮬레이션", degree: 0.50, betweenness: 0.19, bridgeScore: 0.55, citationCount: 178 },
  { id: "P08", label: "EnvSim", cluster: "시뮬레이션", degree: 0.36, betweenness: 0.07, bridgeScore: 0.20, citationCount: 91 },
  { id: "P09", label: "WorldModel-X", cluster: "시뮬레이션", degree: 0.29, betweenness: 0.03, bridgeScore: 0.08, citationCount: 38 },
  { id: "P10", label: "RAG-Fuse", cluster: "RAG", degree: 0.57, betweenness: 0.25, bridgeScore: 0.68, citationCount: 230 },
  { id: "P11", label: "HybridRetriever", cluster: "RAG", degree: 0.43, betweenness: 0.10, bridgeScore: 0.30, citationCount: 115 },
  { id: "P12", label: "ChunkRank", cluster: "RAG", degree: 0.29, betweenness: 0.03, bridgeScore: 0.07, citationCount: 52 },
  { id: "P13", label: "ViLM-Bridge", cluster: "멀티모달", degree: 0.50, betweenness: 0.18, bridgeScore: 0.52, citationCount: 168 },
  { id: "P14", label: "AudioCog", cluster: "멀티모달", degree: 0.36, betweenness: 0.06, bridgeScore: 0.15, citationCount: 72 },
  { id: "P15", label: "SenseNet", cluster: "멀티모달", degree: 0.29, betweenness: 0.02, bridgeScore: 0.05, citationCount: 31 }
];

const edges = [
  { source: "P01", target: "P02", weight: 0.8, confidence: 0.9 },
  { source: "P01", target: "P03", weight: 0.6, confidence: 0.85 },
  { source: "P01", target: "P04", weight: 0.5, confidence: 0.7 },
  { source: "P01", target: "P10", weight: 0.4, confidence: 0.65 },
  { source: "P02", target: "P03", weight: 0.7, confidence: 0.88 },
  { source: "P02", target: "P11", weight: 0.3, confidence: 0.6 },
  { source: "P04", target: "P05", weight: 0.9, confidence: 0.95 },
  { source: "P04", target: "P06", weight: 0.6, confidence: 0.8 },
  { source: "P04", target: "P07", weight: 0.5, confidence: 0.72 },
  { source: "P04", target: "P13", weight: 0.45, confidence: 0.68 },
  { source: "P05", target: "P06", weight: 0.7, confidence: 0.85 },
  { source: "P05", target: "P07", weight: 0.4, confidence: 0.65 },
  { source: "P05", target: "P10", weight: 0.35, confidence: 0.6 },
  { source: "P07", target: "P08", weight: 0.8, confidence: 0.92 },
  { source: "P07", target: "P09", weight: 0.6, confidence: 0.82 },
  { source: "P07", target: "P13", weight: 0.5, confidence: 0.7 },
  { source: "P08", target: "P09", weight: 0.7, confidence: 0.87 },
  { source: "P10", target: "P11", weight: 0.85, confidence: 0.93 },
  { source: "P10", target: "P12", weight: 0.65, confidence: 0.84 },
  { source: "P10", target: "P13", weight: 0.5, confidence: 0.72 },
  { source: "P10", target: "P01", weight: 0.4, confidence: 0.65 },
  { source: "P11", target: "P12", weight: 0.7, confidence: 0.86 },
  { source: "P13", target: "P14", weight: 0.8, confidence: 0.91 },
  { source: "P13", target: "P15", weight: 0.55, confidence: 0.78 },
  { source: "P14", target: "P15", weight: 0.6, confidence: 0.82 },
  { source: "P08", target: "P14", weight: 0.3, confidence: 0.55 }
];

// ─── Visualization ───
const width = 800, height = 640;
const tooltip = d3.select("#tooltip");

const svg = d3.select("#chart")
  .append("svg")
  .attr("width", width)
  .attr("height", height);

const g = svg.append("g");

const radiusScale = d3.scaleSqrt().domain([0, 250]).range([6, 28]);

// Identify bridge nodes (bridgeScore > 0.3)
const bridgeNodes = nodes.filter(n => n.bridgeScore > 0.3).sort((a, b) => b.bridgeScore - a.bridgeScore);

// Populate select
const select = d3.select("#ego-select");
bridgeNodes.forEach(n => {
  select.append("option").attr("value", n.id).text(`${n.label} (bridge: ${n.bridgeScore.toFixed(2)})`);
});

// Legend
const legend = d3.select("#legend");
Object.entries(clusterColors).forEach(([name, color]) => {
  const item = legend.append("div").attr("class", "legend-item");
  item.append("div").attr("class", "legend-swatch").style("background", color);
  item.append("span").text(name);
});

function drawEgoNetwork(egoId) {
  g.selectAll("*").remove();

  const ego = nodes.find(n => n.id === egoId);
  const neighborEdges = edges.filter(e => e.source === egoId || e.target === egoId);
  const neighborIds = new Set();
  neighborEdges.forEach(e => {
    if (e.source === egoId) neighborIds.add(e.target);
    else neighborIds.add(e.source);
  });

  const neighbors = nodes.filter(n => neighborIds.has(n.id));
  const cx = width / 2, cy = height / 2;
  const ringRadius = Math.min(width, height) * 0.35;

  // Group neighbors by cluster, then sort within each group
  const clusterGroups = {};
  neighbors.forEach(n => {
    if (!clusterGroups[n.cluster]) clusterGroups[n.cluster] = [];
    clusterGroups[n.cluster].push(n);
  });
  const sortedNeighbors = [];
  Object.keys(clusterGroups).sort().forEach(c => {
    clusterGroups[c].forEach(n => sortedNeighbors.push(n));
  });

  const angleStep = (2 * Math.PI) / sortedNeighbors.length;
  const positions = new Map();
  positions.set(ego.id, { x: cx, y: cy });

  sortedNeighbors.forEach((n, i) => {
    const angle = i * angleStep - Math.PI / 2;
    positions.set(n.id, {
      x: cx + ringRadius * Math.cos(angle),
      y: cy + ringRadius * Math.sin(angle)
    });
  });

  // Draw cluster arcs behind
  const clusterAngleRanges = {};
  sortedNeighbors.forEach((n, i) => {
    const angle = i * angleStep - Math.PI / 2;
    if (!clusterAngleRanges[n.cluster]) clusterAngleRanges[n.cluster] = { start: angle, end: angle, color: clusterColors[n.cluster] };
    else {
      clusterAngleRanges[n.cluster].end = angle;
    }
  });

  Object.entries(clusterAngleRanges).forEach(([cluster, range]) => {
    const pad = angleStep * 0.4;
    const arc = d3.arc()
      .innerRadius(ringRadius - 40)
      .outerRadius(ringRadius + 40)
      .startAngle(range.start - Math.PI / 2 + Math.PI - pad)
      .endAngle(range.end - Math.PI / 2 + Math.PI + pad);

    g.append("path")
      .attr("d", arc)
      .attr("transform", `translate(${cx},${cy})`)
      .attr("fill", range.color)
      .attr("opacity", 0.07);
  });

  // Draw edges
  const edgeWeightScale = d3.scaleLinear().domain([0.2, 1]).range([1, 6]);

  g.selectAll(".ego-edge")
    .data(neighborEdges)
    .join("line")
    .attr("class", "ego-edge")
    .attr("x1", cx)
    .attr("y1", cy)
    .attr("x2", d => {
      const tid = d.source === egoId ? d.target : d.source;
      return positions.get(tid).x;
    })
    .attr("y2", d => {
      const tid = d.source === egoId ? d.target : d.source;
      return positions.get(tid).y;
    })
    .attr("stroke", d => {
      const tid = d.source === egoId ? d.target : d.source;
      const tn = nodes.find(n => n.id === tid);
      return clusterColors[tn.cluster];
    })
    .attr("stroke-width", d => edgeWeightScale(d.weight))
    .attr("stroke-opacity", 0.45);

  // Draw neighbor nodes
  const neighborG = g.selectAll(".neighbor")
    .data(sortedNeighbors)
    .join("g")
    .attr("class", "neighbor")
    .attr("transform", d => `translate(${positions.get(d.id).x},${positions.get(d.id).y})`);

  neighborG.append("circle")
    .attr("r", d => radiusScale(d.citationCount))
    .attr("fill", d => clusterColors[d.cluster])
    .attr("stroke", "#fff")
    .attr("stroke-width", 2)
    .attr("opacity", 0.85)
    .style("cursor", "pointer")
    .on("mouseover", function(event, d) {
      d3.select(this).attr("opacity", 1).attr("stroke", "#333");
      tooltip.style("opacity", 1).html(
        `<strong>${d.label}</strong><br>` +
        `클러스터: ${d.cluster}<br>` +
        `인용: ${d.citationCount}<br>` +
        `Degree: ${d.degree.toFixed(2)}<br>` +
        `Betweenness: ${d.betweenness.toFixed(2)}<br>` +
        `Bridge Score: ${d.bridgeScore.toFixed(2)}`
      );
    })
    .on("mousemove", function(event) {
      tooltip.style("left", (event.pageX + 14) + "px").style("top", (event.pageY - 14) + "px");
    })
    .on("mouseout", function() {
      d3.select(this).attr("opacity", 0.85).attr("stroke", "#fff");
      tooltip.style("opacity", 0);
    });

  neighborG.append("text")
    .attr("dy", d => radiusScale(d.citationCount) + 14)
    .attr("text-anchor", "middle")
    .attr("font-size", 11)
    .attr("font-weight", 400)
    .attr("fill", "#555")
    .text(d => d.label);

  // Draw ego node
  const egoG = g.append("g").attr("transform", `translate(${cx},${cy})`);

  egoG.append("circle")
    .attr("r", radiusScale(ego.citationCount) + 6)
    .attr("fill", "none")
    .attr("stroke", clusterColors[ego.cluster])
    .attr("stroke-width", 2.5)
    .attr("stroke-dasharray", "5,3")
    .attr("opacity", 0.6);

  egoG.append("circle")
    .attr("r", radiusScale(ego.citationCount))
    .attr("fill", clusterColors[ego.cluster])
    .attr("stroke", "#333")
    .attr("stroke-width", 2.5)
    .style("cursor", "pointer")
    .on("mouseover", function(event) {
      tooltip.style("opacity", 1).html(
        `<strong>${ego.label}</strong> (ego)<br>` +
        `클러스터: ${ego.cluster}<br>` +
        `인용: ${ego.citationCount}<br>` +
        `Degree: ${ego.degree.toFixed(2)}<br>` +
        `Betweenness: ${ego.betweenness.toFixed(2)}<br>` +
        `Bridge Score: ${ego.bridgeScore.toFixed(2)}<br>` +
        `이웃: ${neighbors.length}개 노드, ${new Set(neighbors.map(n=>n.cluster)).size}개 클러스터`
      );
    })
    .on("mousemove", function(event) {
      tooltip.style("left", (event.pageX + 14) + "px").style("top", (event.pageY - 14) + "px");
    })
    .on("mouseout", function() {
      tooltip.style("opacity", 0);
    });

  egoG.append("text")
    .attr("dy", -radiusScale(ego.citationCount) - 10)
    .attr("text-anchor", "middle")
    .attr("font-size", 13)
    .attr("font-weight", 700)
    .attr("fill", "#333")
    .text(ego.label);

  // Cluster summary label
  const clusterCounts = {};
  neighbors.forEach(n => { clusterCounts[n.cluster] = (clusterCounts[n.cluster] || 0) + 1; });
  const summaryText = Object.entries(clusterCounts).map(([c,v]) => `${c}(${v})`).join(" / ");

  g.append("text")
    .attr("x", width / 2)
    .attr("y", height - 16)
    .attr("text-anchor", "middle")
    .attr("font-size", 12)
    .attr("fill", "#999")
    .text(`연결 클러스터: ${summaryText}`);
}

// Initial draw
drawEgoNetwork(bridgeNodes[0].id);

// Select change
select.on("change", function() {
  drawEgoNetwork(this.value);
});
</script>
</body>
</html>
