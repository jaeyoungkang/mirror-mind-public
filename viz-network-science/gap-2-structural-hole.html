<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structural Hole Visualization — Burt's Structural Holes</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fafaf8;
    font-family: 'Noto Sans KR', sans-serif;
    color: #1a1a1a;
    padding: 48px 56px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .question {
    font-size: 15px;
    font-weight: 400;
    color: #666;
    margin-bottom: 6px;
  }
  .rationale {
    font-size: 13px;
    font-weight: 300;
    color: #888;
    line-height: 1.7;
    max-width: 720px;
    margin-bottom: 32px;
  }
  #chart { position: relative; }
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    line-height: 1.6;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .tooltip .label { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .tooltip .row { display: flex; justify-content: space-between; gap: 24px; }
  .tooltip .key { color: #888; }
  .tooltip .val { font-weight: 500; }
</style>
</head>
<body>

<h1>Structural Hole Visualization</h1>
<p class="question">이 시각화가 답하는 질문: 네트워크 어디에 구조적 공백(structural hole)이 있는가?</p>
<p class="rationale">
  Burt(1992)의 구조적 공백 이론에 따르면, 클러스터 간 연결이 빠진 위치는 정보 중개(brokerage)의 기회이자 네트워크 취약점이다.
  클러스터를 원형으로 배치하고 실제 연결을 실선 두께로, 구조적 공백을 점선으로 표시하면
  "어디에 다리(bridge)를 놓아야 하는가"를 위상적으로 직접 읽을 수 있다.
  gapScore가 높은 점선일수록 해소 우선순위가 높은 공백이다.
</p>

<div id="chart"></div>

<script>
// ── Shared Dummy Data ──
const clusters = ['Reasoning', 'Memory', 'Planning', 'Retrieval', 'Generation'];
const data = [
  { source: 'Reasoning',  target: 'Memory',     observedStrength: 0.82, expectedStrength: 0.85, gapScore: 0.08, structuralScarcity: 0.15, coverage: 0.90, uncertainty: 0.10 },
  { source: 'Reasoning',  target: 'Planning',    observedStrength: 0.35, expectedStrength: 0.78, gapScore: 0.72, structuralScarcity: 0.80, coverage: 0.25, uncertainty: 0.65 },
  { source: 'Reasoning',  target: 'Retrieval',   observedStrength: 0.60, expectedStrength: 0.70, gapScore: 0.25, structuralScarcity: 0.35, coverage: 0.55, uncertainty: 0.30 },
  { source: 'Memory',     target: 'Planning',    observedStrength: 0.20, expectedStrength: 0.72, gapScore: 0.78, structuralScarcity: 0.85, coverage: 0.18, uncertainty: 0.72 },
  { source: 'Memory',     target: 'Generation',  observedStrength: 0.68, expectedStrength: 0.65, gapScore: 0.05, structuralScarcity: 0.10, coverage: 0.85, uncertainty: 0.08 },
  { source: 'Planning',   target: 'Retrieval',   observedStrength: 0.15, expectedStrength: 0.68, gapScore: 0.82, structuralScarcity: 0.90, coverage: 0.12, uncertainty: 0.78 },
  { source: 'Planning',   target: 'Generation',  observedStrength: 0.45, expectedStrength: 0.60, gapScore: 0.35, structuralScarcity: 0.45, coverage: 0.40, uncertainty: 0.42 },
  { source: 'Retrieval',  target: 'Generation',  observedStrength: 0.72, expectedStrength: 0.75, gapScore: 0.10, structuralScarcity: 0.18, coverage: 0.78, uncertainty: 0.12 },
  { source: 'Reasoning',  target: 'Generation',  observedStrength: 0.28, expectedStrength: 0.74, gapScore: 0.70, structuralScarcity: 0.75, coverage: 0.22, uncertainty: 0.60 },
  { source: 'Memory',     target: 'Retrieval',   observedStrength: 0.55, expectedStrength: 0.62, gapScore: 0.18, structuralScarcity: 0.28, coverage: 0.62, uncertainty: 0.22 },
];

const gapThreshold = 0.4;

// ── Dimensions ──
const width = 700;
const height = 700;
const cx = width / 2;
const cy = height / 2;
const radius = 250;
const nodeRadius = 40;

// ── Node positions (circular layout) ──
const nodes = clusters.map((name, i) => {
  const angle = (2 * Math.PI * i) / clusters.length - Math.PI / 2;
  return {
    name,
    x: cx + radius * Math.cos(angle),
    y: cy + radius * Math.sin(angle),
    angle,
  };
});

const nodeMap = {};
nodes.forEach(n => nodeMap[n.name] = n);

// ── Color for cluster nodes ──
const nodeColor = d3.scaleOrdinal()
  .domain(clusters)
  .range(['#4A90D9', '#E8734A', '#50B88E', '#D4A843', '#9B6DB7']);

// ── SVG ──
const svg = d3.select('#chart')
  .append('svg')
  .attr('width', width)
  .attr('height', height);

// ── Tooltip ──
const tooltip = d3.select('#chart')
  .append('div')
  .attr('class', 'tooltip');

// ── Edges: solid for strong connections, dashed for gaps ──
const solidEdges = data.filter(d => d.gapScore <= gapThreshold);
const gapEdges = data.filter(d => d.gapScore > gapThreshold);

// Solid edges (observed connections)
const edgeWidthScale = d3.scaleLinear().domain([0, 1]).range([1, 12]);

svg.selectAll('.solid-edge')
  .data(solidEdges)
  .enter()
  .append('line')
  .attr('class', 'solid-edge')
  .attr('x1', d => nodeMap[d.source].x)
  .attr('y1', d => nodeMap[d.source].y)
  .attr('x2', d => nodeMap[d.target].x)
  .attr('y2', d => nodeMap[d.target].y)
  .attr('stroke', '#c0c0c0')
  .attr('stroke-width', d => edgeWidthScale(d.observedStrength))
  .attr('stroke-linecap', 'round')
  .attr('opacity', 0.6)
  .on('mouseover', function(event, d) {
    d3.select(this).attr('opacity', 1).attr('stroke', '#888');
    showTooltip(event, d, false);
  })
  .on('mousemove', moveTooltip)
  .on('mouseout', function() {
    d3.select(this).attr('opacity', 0.6).attr('stroke', '#c0c0c0');
    hideTooltip();
  });

// Gap edges (structural holes) — dashed
const gapColorScale = d3.scaleSequential(d3.interpolateOrRd).domain([0.4, 1]);

svg.selectAll('.gap-edge')
  .data(gapEdges)
  .enter()
  .append('line')
  .attr('class', 'gap-edge')
  .attr('x1', d => nodeMap[d.source].x)
  .attr('y1', d => nodeMap[d.source].y)
  .attr('x2', d => nodeMap[d.target].x)
  .attr('y2', d => nodeMap[d.target].y)
  .attr('stroke', d => gapColorScale(d.gapScore))
  .attr('stroke-width', d => 2 + d.gapScore * 4)
  .attr('stroke-dasharray', '8,6')
  .attr('stroke-linecap', 'round')
  .attr('opacity', 0.8)
  .on('mouseover', function(event, d) {
    d3.select(this).attr('opacity', 1).attr('stroke-width', d => 4 + d.gapScore * 6);
    showTooltip(event, d, true);
  })
  .on('mousemove', moveTooltip)
  .on('mouseout', function(event, d) {
    d3.select(this).attr('opacity', 0.8).attr('stroke-width', d => 2 + d.gapScore * 4);
    hideTooltip();
  });

// Gap labels on dashed edges
svg.selectAll('.gap-label')
  .data(gapEdges)
  .enter()
  .append('text')
  .attr('x', d => (nodeMap[d.source].x + nodeMap[d.target].x) / 2)
  .attr('y', d => (nodeMap[d.source].y + nodeMap[d.target].y) / 2 - 8)
  .attr('text-anchor', 'middle')
  .attr('font-family', 'Noto Sans KR')
  .attr('font-size', '11px')
  .attr('font-weight', '500')
  .attr('fill', d => gapColorScale(d.gapScore))
  .text(d => `gap ${d.gapScore.toFixed(2)}`);

// ── Nodes ──
const nodeG = svg.selectAll('.node')
  .data(nodes)
  .enter()
  .append('g')
  .attr('class', 'node')
  .attr('transform', d => `translate(${d.x},${d.y})`);

nodeG.append('circle')
  .attr('r', nodeRadius)
  .attr('fill', d => nodeColor(d.name))
  .attr('stroke', '#fff')
  .attr('stroke-width', 3)
  .attr('opacity', 0.9);

nodeG.append('text')
  .attr('text-anchor', 'middle')
  .attr('dy', '0.35em')
  .attr('fill', '#fff')
  .attr('font-size', '12px')
  .attr('font-weight', '500')
  .attr('font-family', 'Noto Sans KR')
  .text(d => d.name);

// ── Legend ──
const legendG = svg.append('g').attr('transform', `translate(24, ${height - 80})`);

legendG.append('line')
  .attr('x1', 0).attr('y1', 0).attr('x2', 40).attr('y2', 0)
  .attr('stroke', '#c0c0c0').attr('stroke-width', 3);
legendG.append('text')
  .attr('x', 48).attr('y', 4)
  .attr('font-size', '11px').attr('fill', '#888').attr('font-family', 'Noto Sans KR')
  .text('실선: 관측된 연결 (두께 = observedStrength)');

legendG.append('line')
  .attr('x1', 0).attr('y1', 24).attr('x2', 40).attr('y2', 24)
  .attr('stroke', gapColorScale(0.7)).attr('stroke-width', 3).attr('stroke-dasharray', '8,6');
legendG.append('text')
  .attr('x', 48).attr('y', 28)
  .attr('font-size', '11px').attr('fill', '#888').attr('font-family', 'Noto Sans KR')
  .text('점선: 구조적 공백 (색 농도 = gapScore)');

// ── Tooltip helpers ──
function showTooltip(event, d, isGap) {
  tooltip.style('opacity', 1)
    .html(`
      <div class="label">${d.source} — ${d.target} ${isGap ? '(Structural Hole)' : ''}</div>
      <div class="row"><span class="key">Observed</span><span class="val">${d.observedStrength.toFixed(2)}</span></div>
      <div class="row"><span class="key">Expected</span><span class="val">${d.expectedStrength.toFixed(2)}</span></div>
      <div class="row"><span class="key">Gap Score</span><span class="val">${d.gapScore.toFixed(2)}</span></div>
      <div class="row"><span class="key">Scarcity</span><span class="val">${d.structuralScarcity.toFixed(2)}</span></div>
      <div class="row"><span class="key">Coverage</span><span class="val">${d.coverage.toFixed(2)}</span></div>
    `);
}
function moveTooltip(event) {
  tooltip.style('left', (event.offsetX + 16) + 'px').style('top', (event.offsetY - 10) + 'px');
}
function hideTooltip() {
  tooltip.style('opacity', 0);
}
</script>
</body>
</html>
