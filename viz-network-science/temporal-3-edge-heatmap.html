<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporal Edge Heatmap</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fafaf8;
    font-family: 'Noto Sans KR', sans-serif;
    color: #1a1a1a;
    padding: 48px 56px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .question {
    font-size: 15px;
    color: #666;
    margin-bottom: 6px;
    font-weight: 400;
  }
  .rationale {
    font-size: 13px;
    color: #888;
    line-height: 1.7;
    margin-bottom: 36px;
    max-width: 820px;
  }
  #chart { width: 100%; }
  .tooltip {
    position: absolute;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.6;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .axis text {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    fill: #555;
  }
  .axis path, .axis line { stroke: none; }
  .cell { stroke: #fafaf8; stroke-width: 2; rx: 3; }
  .cell:hover { stroke: #333; stroke-width: 2; }
  .burst-marker {
    font-size: 10px;
    fill: #fff;
    text-anchor: middle;
    pointer-events: none;
    font-weight: 700;
  }
  .color-legend { margin-top: 20px; display: flex; align-items: center; gap: 8px; }
  .color-legend span { font-size: 11px; color: #888; }
  .color-bar { height: 12px; border-radius: 3px; }
  .annotation {
    font-size: 11px;
    fill: #999;
    font-style: italic;
  }
</style>
</head>
<body>

<h1>Temporal Edge Heatmap</h1>
<p class="question">이 시각화가 답하는 질문: "어느 클러스터 쌍의 연결이 언제 강해졌는가?"</p>
<p class="rationale">
  행에 클러스터 쌍, 열에 연도를 배치한 히트맵은 cross-cluster 연결의 시공간 패턴을 한눈에 포착한다.
  CiteSpace의 time-zone view가 "노드가 언제 출현했는가"를 보여준다면,
  이 변형은 "엣지가 언제 폭발했는가"에 초점을 맞춘다.
  색 농도가 급변하는 행(클러스터 쌍)과 열(연도)의 교차점이 곧 떠오르는 연구 프런티어다.
</p>

<div id="chart"></div>
<div class="color-legend" id="color-legend"></div>
<div class="tooltip" id="tooltip"></div>

<script>
// ─── 공유 더미 데이터 ───
const clusters = [
  { id: 'ext_mem',   label: '외부 메모리',     color: '#4a90d9' },
  { id: 'cog_arch',  label: '인지 아키텍처',   color: '#e8743b' },
  { id: 'sim',       label: '시뮬레이션',       color: '#50b48a' },
  { id: 'rag',       label: 'RAG',              color: '#9b59b6' },
  { id: 'multi',     label: '멀티모달',         color: '#e74c6f' },
];

const years = [2020, 2021, 2022, 2023, 2024, 2025, 2026];

const labelMap = {};
clusters.forEach(c => labelMap[c.id] = c.label);

const edges = [
  { source: 'ext_mem',  target: 'cog_arch', weights: [3, 4, 5, 7, 10, 14, 18],  burst: false },
  { source: 'ext_mem',  target: 'rag',      weights: [0, 1, 2, 5, 15, 28, 40],  burst: true },
  { source: 'ext_mem',  target: 'sim',      weights: [1, 1, 2, 3, 4, 5, 7],     burst: false },
  { source: 'ext_mem',  target: 'multi',    weights: [0, 0, 0, 0, 2, 8, 15],    burst: true },
  { source: 'cog_arch', target: 'sim',      weights: [2, 3, 4, 5, 6, 8, 10],    burst: false },
  { source: 'cog_arch', target: 'rag',      weights: [0, 0, 1, 4, 12, 22, 35],  burst: true },
  { source: 'cog_arch', target: 'multi',    weights: [0, 0, 0, 1, 3, 10, 18],   burst: true },
  { source: 'sim',      target: 'rag',      weights: [0, 0, 1, 2, 5, 10, 16],   burst: false },
  { source: 'sim',      target: 'multi',    weights: [0, 0, 0, 1, 4, 12, 20],   burst: true },
  { source: 'rag',      target: 'multi',    weights: [0, 0, 0, 2, 8, 25, 50],   burst: true },
];

// compute deltas
edges.forEach(e => {
  const w = e.weights;
  e.deltas = w.map((v, i) => i === 0 ? 0 : v - w[i - 1]);
});

// ─── 레이아웃 ───
const margin = { top: 30, right: 50, bottom: 20, left: 200 };
const cellW = 80, cellH = 36;
const width = years.length * cellW;
const height = edges.length * cellH;

const tooltip = d3.select('#tooltip');

const svg = d3.select('#chart').append('svg')
  .attr('width', width + margin.left + margin.right)
  .attr('height', height + margin.top + margin.bottom)
  .append('g')
  .attr('transform', `translate(${margin.left},${margin.top})`);

// scales
const x = d3.scaleBand()
  .domain(years.map(String))
  .range([0, width])
  .padding(0.08);

const pairLabels = edges.map(e => `${labelMap[e.source]} ↔ ${labelMap[e.target]}`);
const y = d3.scaleBand()
  .domain(pairLabels)
  .range([0, height])
  .padding(0.1);

const maxWeight = d3.max(edges, e => d3.max(e.weights));
const colorScale = d3.scaleSequential()
  .domain([0, maxWeight])
  .interpolator(d3.interpolateYlOrRd);

// x axis (years)
svg.append('g')
  .attr('class', 'axis')
  .call(d3.axisTop(x).tickSize(0))
  .select('.domain').remove();

// y axis (cluster pairs)
const yAxis = svg.append('g')
  .attr('class', 'axis')
  .call(d3.axisLeft(y).tickSize(0));
yAxis.select('.domain').remove();

// highlight burst pairs
yAxis.selectAll('text')
  .attr('font-weight', (d, i) => edges[i].burst ? 600 : 400)
  .attr('fill', (d, i) => edges[i].burst ? '#c0392b' : '#555');

// cells
edges.forEach((e, ei) => {
  const pairLabel = pairLabels[ei];

  years.forEach((yr, yi) => {
    const w = e.weights[yi];
    const delta = e.deltas[yi];

    const cellG = svg.append('g');

    cellG.append('rect')
      .attr('class', 'cell')
      .attr('x', x(String(yr)))
      .attr('y', y(pairLabel))
      .attr('width', x.bandwidth())
      .attr('height', y.bandwidth())
      .attr('rx', 3)
      .attr('fill', w === 0 ? '#f0f0ee' : colorScale(w))
      .on('mouseover', (event) => {
        tooltip.style('opacity', 1).html(
          `<strong>${pairLabel}</strong><br>` +
          `${yr}년: 엣지 ${w}개<br>` +
          `변화량(Δ): ${delta >= 0 ? '+' : ''}${delta}<br>` +
          `Burst: ${e.burst ? '예 — 떠오르는 프런티어' : '아니오'}`
        );
      })
      .on('mousemove', (event) => {
        tooltip.style('left', (event.pageX + 14) + 'px').style('top', (event.pageY - 24) + 'px');
      })
      .on('mouseout', () => tooltip.style('opacity', 0));

    // weight number inside cell
    if (w > 0) {
      cellG.append('text')
        .attr('x', x(String(yr)) + x.bandwidth() / 2)
        .attr('y', y(pairLabel) + y.bandwidth() / 2)
        .attr('dy', '0.35em')
        .attr('text-anchor', 'middle')
        .attr('font-size', '11px')
        .attr('font-weight', 500)
        .attr('fill', w > maxWeight * 0.55 ? '#fff' : '#444')
        .text(w);
    }

    // burst marker
    if (e.burst && delta > 8) {
      cellG.append('text')
        .attr('class', 'burst-marker')
        .attr('x', x(String(yr)) + x.bandwidth() - 8)
        .attr('y', y(pairLabel) + 10)
        .attr('font-size', '8px')
        .attr('fill', w > maxWeight * 0.55 ? '#ffe' : '#c0392b')
        .text('burst');
    }
  });
});

// annotation arrow for frontier
svg.append('text')
  .attr('class', 'annotation')
  .attr('x', width + 8)
  .attr('y', y(pairLabels[9]) + y.bandwidth() / 2)
  .attr('dy', '0.35em')
  .text('← 최대 프런티어');

// ─── 색상 범례 ───
const legendW = 200;
const legendSvg = d3.select('#color-legend');
legendSvg.append('span').text('0');

const canvas = document.createElement('canvas');
canvas.width = legendW; canvas.height = 12;
const ctx = canvas.getContext('2d');
for (let i = 0; i < legendW; i++) {
  ctx.fillStyle = colorScale(maxWeight * i / legendW);
  ctx.fillRect(i, 0, 1, 12);
}
const img = document.createElement('img');
img.src = canvas.toDataURL();
img.style.height = '12px';
img.style.width = legendW + 'px';
img.style.borderRadius = '3px';
legendSvg.node().appendChild(img);

legendSvg.append('span').text(maxWeight);
legendSvg.append('span').style('margin-left', '16px').style('color', '#c0392b').style('font-weight', '600').text('빨간 라벨 = burst 쌍');
</script>
</body>
</html>
