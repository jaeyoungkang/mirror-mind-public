<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MirrorMind Progress Board</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap");

      :root {
        --bg: #f5f0e8;
        --panel: rgba(255, 252, 246, 0.88);
        --ink: #161412;
        --muted: #6f695f;
        --line: rgba(22, 20, 18, 0.1);
        --emerald: #0f766e;
        --emerald-soft: rgba(15, 118, 110, 0.12);
        --amber: #b45309;
        --amber-soft: rgba(180, 83, 9, 0.12);
        --rose: #be123c;
        --rose-soft: rgba(190, 18, 60, 0.12);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Space Grotesk", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(180, 83, 9, 0.12), transparent 24%),
          linear-gradient(180deg, #f7f3ec 0%, var(--bg) 100%);
      }

      .shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 44px 18px 80px;
      }

      .eyebrow, .mono {
        font-family: "IBM Plex Mono", monospace;
      }

      .eyebrow {
        color: var(--emerald);
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 0.16em;
        margin-bottom: 10px;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 5vw, 60px);
        line-height: 0.96;
        letter-spacing: -0.05em;
      }

      .lead {
        margin: 14px 0 0;
        max-width: 760px;
        color: var(--muted);
        line-height: 1.75;
        font-size: 15px;
      }

      .topbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 26px;
      }

      .refresh {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.76);
        border-radius: 999px;
        padding: 12px 16px;
        font: inherit;
        cursor: pointer;
      }

      .status-note {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
        text-align: right;
      }

      .board {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.9fr);
        gap: 18px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid rgba(22, 20, 18, 0.08);
        border-radius: 28px;
        padding: 22px;
        box-shadow: 0 28px 80px rgba(22, 20, 18, 0.08);
        backdrop-filter: blur(12px);
      }

      .hero {
        display: grid;
        grid-template-columns: 210px minmax(0, 1fr);
        gap: 22px;
        align-items: center;
      }

      .ring {
        width: 210px;
        height: 210px;
        border-radius: 50%;
        position: relative;
        display: grid;
        place-items: center;
        background: conic-gradient(var(--emerald) 0 var(--fill), rgba(22, 20, 18, 0.08) var(--fill) 100%);
      }

      .ring::after {
        content: "";
        position: absolute;
        inset: 18px;
        border-radius: 50%;
        border: 1px solid rgba(22, 20, 18, 0.06);
        background: rgba(255, 253, 248, 0.96);
      }

      .ring-copy {
        position: relative;
        z-index: 1;
        text-align: center;
      }

      .ring-copy strong {
        display: block;
        font-size: 52px;
        line-height: 0.95;
        letter-spacing: -0.06em;
      }

      .ring-copy span {
        display: block;
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .headline {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 7px 11px;
        font-size: 12px;
      }

      .pill.active { background: var(--emerald-soft); color: var(--emerald); }
      .pill.warning { background: var(--amber-soft); color: var(--amber); }
      .pill.danger { background: var(--rose-soft); color: var(--rose); }

      .hero h2 {
        margin: 0 0 10px;
        font-size: clamp(24px, 3vw, 36px);
        letter-spacing: -0.04em;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        line-height: 1.8;
        font-size: 15px;
      }

      .meta-grid, .milestones {
        display: grid;
        gap: 12px;
      }

      .meta-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 16px;
      }

      .meta-card, .milestone-card, .turn-card, .session-button {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.58);
        border-radius: 20px;
      }

      .meta-card { padding: 14px 16px; }
      .meta-label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        margin-bottom: 8px;
      }
      .meta-value {
        font-size: 18px;
        letter-spacing: -0.03em;
      }

      .section-title {
        margin: 0 0 14px;
        font-size: 24px;
        letter-spacing: -0.04em;
      }

      .milestones { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .milestone-card { padding: 18px; }
      .milestone-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }
      .milestone-head strong { font-size: 16px; }
      .milestone-head span { color: var(--muted); font-size: 14px; }
      .bar {
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(22, 20, 18, 0.08);
      }
      .bar > span {
        display: block;
        width: var(--width);
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #0f766e 0%, #34d399 100%);
      }
      .milestone-copy {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      .turns, .session-list, .step-list, .verification-list { display: grid; gap: 12px; }
      .turn-card { padding: 18px; }
      .turn-card.active {
        background:
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.12), transparent 36%),
          rgba(255, 255, 255, 0.72);
      }
      .turn-top {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: flex-start;
      }
      .turn-title {
        margin: 0 0 8px;
        font-size: 22px;
        letter-spacing: -0.04em;
      }
      .turn-summary {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.75;
      }
      .turn-progress {
        min-width: 92px;
        text-align: right;
      }
      .turn-progress strong {
        display: block;
        font-size: 30px;
        letter-spacing: -0.05em;
      }
      .turn-progress span {
        color: var(--muted);
        font-size: 12px;
      }
      .step-item, .verification-item {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.7);
        padding: 12px 14px;
      }
      .step-row, .verification-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }
      .step-copy, .verification-copy, .timeline-meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.65;
      }

      .session-button {
        width: 100%;
        padding: 16px;
        text-align: left;
        cursor: pointer;
      }
      .session-button.active {
        background: rgba(15, 118, 110, 0.08);
        border-color: rgba(15, 118, 110, 0.24);
      }
      .session-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      .session-name { font-size: 14px; line-height: 1.55; }
      .session-meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }

      .empty {
        padding: 24px;
        border-radius: 20px;
        border: 1px dashed var(--line);
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 1024px) {
        .board { grid-template-columns: 1fr; }
        .hero { grid-template-columns: 1fr; }
      }

      @media (max-width: 720px) {
        .meta-grid, .milestones { grid-template-columns: 1fr; }
        .turn-top { flex-direction: column; }
        .turn-progress { text-align: left; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">MirrorMind Public</div>
          <h1>Progress Board</h1>
          <p class="lead">
            글로벌 진행률, 마일스톤, 최근 턴별 세부 진행상황을 한 화면에서 읽는다.
            이 페이지는 <span class="mono">progress/latest.json</span>을 15초마다 다시 조회한다.
          </p>
        </div>
        <div>
          <button id="refreshButton" class="refresh" type="button">Refresh</button>
          <div id="statusNote" class="status-note">Loading…</div>
        </div>
      </header>

      <section class="board">
        <div>
          <section id="overview" class="panel"></section>
          <section class="panel" style="margin-top: 18px">
            <h2 class="section-title">Milestones</h2>
            <div id="milestones" class="milestones"></div>
          </section>
          <section class="panel" style="margin-top: 18px">
            <h2 class="section-title">Turns</h2>
            <div id="turns" class="turns"></div>
          </section>
        </div>
        <aside class="panel">
          <h2 class="section-title">Sessions</h2>
          <div id="sessions" class="session-list"></div>
        </aside>
      </section>
    </main>

    <script>
      const REFRESH_MS = 15000;
      const state = { snapshot: null, selectedSessionId: null };
      const overview = document.getElementById("overview");
      const milestones = document.getElementById("milestones");
      const turns = document.getElementById("turns");
      const sessions = document.getElementById("sessions");
      const statusNote = document.getElementById("statusNote");
      document.getElementById("refreshButton").addEventListener("click", () => void refresh());
      void refresh();
      window.setInterval(() => void refresh(false), REFRESH_MS);

      async function refresh(announce = true) {
        if (announce) statusNote.textContent = "Refreshing…";
        try {
          const response = await fetch(`./latest.json?ts=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) throw new Error(`fetch failed (${response.status})`);
          const snapshot = await response.json();
          state.snapshot = snapshot;
          const available = snapshot.sessions ?? [];
          if (!available.some((item) => item.sessionId === state.selectedSessionId)) {
            state.selectedSessionId = snapshot.activeSessionId ?? available[0]?.sessionId ?? null;
          }
          render();
          statusNote.textContent = `Updated ${formatTimestamp(snapshot.generatedAt)}`;
        } catch (error) {
          console.error(error);
          statusNote.textContent = "latest.json을 읽지 못했습니다.";
        }
      }

      function render() {
        const snapshot = state.snapshot;
        const list = snapshot?.sessions ?? [];
        const session = list.find((item) => item.sessionId === state.selectedSessionId) ?? list[0];
        renderSessions(list, session?.sessionId ?? null);
        if (!session) {
          overview.innerHTML = `<div class="empty">표시할 세션 데이터가 없습니다.</div>`;
          milestones.innerHTML = "";
          turns.innerHTML = `<div class="empty">표시할 턴 데이터가 없습니다.</div>`;
          return;
        }

        overview.innerHTML = `
          <div class="hero">
            <div class="ring" style="--fill:${clampPercent(session.progress?.globalPercent)}%">
              <div class="ring-copy">
                <strong>${session.progress?.globalPercent ?? 0}%</strong>
                <span>${escapeHtml(session.progress?.globalLabel ?? "진행 중")}</span>
              </div>
            </div>
            <div>
              <div class="headline">
                <span class="pill ${session.active ? "active" : "warning"}">${session.active ? "Active session" : "Idle session"}</span>
                <span class="pill warning">${escapeHtml(session.progress?.currentTurnLabel ?? "대기")}</span>
              </div>
              <h2>${escapeHtml(session.progress?.globalLabel ?? "Progress")}</h2>
              <p>${escapeHtml(session.currentTurn?.latestAssistantMessage || session.lastAssistantMessage || "세션 요약이 없습니다.")}</p>
              <div class="meta-grid">
                <div class="meta-card"><div class="meta-label mono">Repo</div><div class="meta-value">${escapeHtml(shorten(snapshot.repoRoot ?? session.cwd, 42))}</div></div>
                <div class="meta-card"><div class="meta-label mono">Session</div><div class="meta-value">${escapeHtml(shorten(session.sessionId, 16))}</div></div>
                <div class="meta-card"><div class="meta-label mono">Current Turn</div><div class="meta-value">${session.currentTurn?.progressPercent ?? session.progress?.currentTurnPercent ?? 0}%</div></div>
              </div>
            </div>
          </div>
        `;

        milestones.innerHTML = (session.milestones ?? []).map((item) => `
          <article class="milestone-card">
            <div class="milestone-head"><strong>${escapeHtml(item.title)}</strong><span>${item.percent}%</span></div>
            <div class="bar" style="--width:${clampPercent(item.percent)}%"><span></span></div>
            <p class="milestone-copy">${escapeHtml(item.evidence || item.status || "")}</p>
          </article>
        `).join("") || `<div class="empty">마일스톤 데이터가 없습니다.</div>`;

        turns.innerHTML = (session.recentTurns ?? []).map((turn) => `
          <article class="turn-card ${turn.turnId === session.currentTurn?.turnId ? "active" : ""}">
            <div class="turn-top">
              <div>
                <div class="headline">
                  <span class="pill ${toneClass(turn.status)}">${escapeHtml(turn.status)}</span>
                  <span class="pill warning">${escapeHtml(turn.label || "turn")}</span>
                </div>
                <h3 class="turn-title">${escapeHtml(turn.headline || "턴")}</h3>
                <p class="turn-summary">${escapeHtml(turn.summary || "")}</p>
              </div>
              <div class="turn-progress"><strong>${turn.percent ?? 0}%</strong><span>${escapeHtml(turn.label || "진행도")}</span></div>
            </div>
            ${(turn.planSteps ?? []).length ? `<div class="step-list">${turn.planSteps.map((step) => `
              <div class="step-item">
                <div class="step-row"><strong>${escapeHtml(step.step)}</strong><span class="pill ${toneClass(step.status)}">${escapeHtml(step.status)}</span></div>
              </div>
            `).join("")}</div>` : ""}
            ${(turn.verifications ?? []).length ? `<div class="verification-list">${turn.verifications.map((item) => `
              <div class="verification-item">
                <div class="verification-row"><strong>${escapeHtml(item.label || item.key)}</strong><span class="pill ${toneClass(item.status)}">${escapeHtml(item.status)}</span></div>
                <div class="verification-copy">${escapeHtml(item.summary || item.command || "")}</div>
              </div>
            `).join("")}</div>` : ""}
            <div class="timeline-meta mono">${turn.startedAt ? `start ${formatTimestamp(turn.startedAt)}` : ""} ${turn.endedAt ? `· end ${formatTimestamp(turn.endedAt)}` : ""} · ${escapeHtml(turn.turnId || "")}</div>
          </article>
        `).join("") || `<div class="empty">최근 턴 데이터가 없습니다.</div>`;
      }

      function renderSessions(list, selectedId) {
        sessions.innerHTML = list.map((session) => `
          <button type="button" class="session-button ${session.sessionId === selectedId ? "active" : ""}" data-session-id="${escapeAttr(session.sessionId)}">
            <div class="session-top">
              <div class="session-name">${escapeHtml(shorten(session.cwd, 42))}</div>
              <span class="pill ${session.active ? "active" : "warning"}">${session.progress?.globalPercent ?? 0}%</span>
            </div>
            <div class="session-meta">
              <div>${escapeHtml(session.progress?.globalLabel ?? "진행 중")}</div>
              <div>${escapeHtml(formatTimestamp(session.updatedAt))}</div>
            </div>
          </button>
        `).join("") || `<div class="empty">세션이 없습니다.</div>`;

        sessions.querySelectorAll("[data-session-id]").forEach((button) => {
          button.addEventListener("click", () => {
            state.selectedSessionId = button.getAttribute("data-session-id");
            render();
          });
        });
      }

      function toneClass(status) {
        if (status === "completed" || status === "passed") return "active";
        if (status === "failed" || status === "aborted") return "danger";
        return "warning";
      }
      function clampPercent(value) {
        const safe = Number(value ?? 0);
        return Math.max(0, Math.min(100, Number.isFinite(safe) ? safe : 0));
      }
      function shorten(value, max = 48) {
        const text = String(value ?? "");
        return text.length > max ? `${text.slice(0, max - 1)}…` : text;
      }
      function formatTimestamp(value) {
        if (!value) return "N/A";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleString("ko-KR", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
      }
      function escapeHtml(value) {
        return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      }
      function escapeAttr(value) {
        return escapeHtml(value).replaceAll("'", "&#39;");
      }
    </script>
  </body>
</html>
